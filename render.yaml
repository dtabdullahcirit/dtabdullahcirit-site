services:
  - type: web
    name: dtabdullahcirit-site
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: true
      # Render dosya sistemi geçici olduğundan canlıda yalnızca e-postaya başarıyla iletilen formlar kabul edilir.
      - key: EMAIL_DELIVERY_REQUIRED
        value: true
      - key: APPOINTMENT_EMAIL_USER
        value: dtabdullahcirit@gmail.com
      - key: APPOINTMENT_EMAIL_TO
        value: dtabdullahcirit@gmail.com
      - key: APPOINTMENT_EMAIL_PASS
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
